<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d7263d" />
  <title>Glizzy / Unglizzy</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>glizzy machine</h1>
    <p class="tagline">clean version. fewer crimes. same dogs.</p>

    <div class="image-wrap">
      <img id="displayImage" src="" alt="random glizzy or unglizzy image" />
    </div>

    <div class="button-stack">
      <button id="glizzyButton" type="button">GLIZZY</button>
      <button id="unglizzyButton" type="button">UNGLIZZY</button>
    </div>

    <p id="caption" class="caption">load the manifest and begin.</p>
    <audio id="glizzyAudio" preload="auto"></audio>
  </main>

  <script src="app.js"></script>
</body>
</html>
